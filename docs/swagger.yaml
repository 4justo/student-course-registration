openapi: 3.1.0
info:
  title: Student Course Registration API
  version: 0.1.0
  description: API documentation for the Student Course Registration System.
servers:
  - url: http://localhost:4000
paths:
  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Student login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registrationNumber:
                  type: string
                password:
                  type: string
              required:
                - registrationNumber
                - password
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
