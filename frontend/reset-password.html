<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduRegister — Reset Password</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="auth-container">
      <div class="auth-wrapper stacked-card auth-card">
        <h2>Reset your password</h2>
        <p class="subtitle">Use the reset link from the email service or paste the token below.</p>
        <label>
          Reset token
          <input id="reset-token" type="text" placeholder="Paste the token" />
        </label>
        <label>
          New password
          <input id="new-password" type="password" placeholder="Enter a new password" />
        </label>
        <button id="confirm-reset">Update password</button>
        <p id="reset-status" class="small-text"></p>
      </div>
    </section>
  </main>
  <script src="scripts.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const tokenInput = document.getElementById('reset-token');
      if (tokenInput && token) {
        tokenInput.value = token;
      }
    });
  </script>
</body>
</html>
