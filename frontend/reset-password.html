<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduRegister — Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 24px 16px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .reset-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
      padding: 36px 36px 32px;
    }
    .card-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .card-brand-icon {
      width: 36px;
      height: 36px;
      background: #111;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .card-brand-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.01em;
    }
    .card-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.025em;
      line-height: 1.25;
      margin: 0 0 8px;
    }
    .card-subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.55;
      margin: 0 0 28px;
    }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
    }
    .field-label sup { color: #111; }
    .field-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.875rem;
      color: #111;
      background: #fff;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: unset;
    }
    .field-input::placeholder { color: #9ca3af; }
    .field-input:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
    }
    .field-input.password-field {
      letter-spacing: 0.15em;
    }
    .field-group { margin-bottom: 16px; }
    .submit-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 18px;
      margin-top: 4px;
    }
    .submit-btn:hover { background: #222; }
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #374151;
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover { color: #111; }
    .back-link svg { width: 14px; height: 14px; }
    #reset-status {
      font-size: 0.8rem;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: none;
    }
    #reset-status.error   { display: block; background: #fef2f2; color: #b91c1c; }
    #reset-status.success { display: block; background: #f0fdf4; color: #15803d; }
  </style>
</head>
<body>
  <div class="reset-card">

    <!-- Brand -->
    <div class="card-brand">
      <div class="card-brand-icon">🎓</div>
      <span class="card-brand-name">EduRegister</span>
    </div>

    <h1 class="card-title">Reset Password</h1>
    <p class="card-subtitle">Please enter your current password and choose a new password to update your account security.</p>

    <!-- Status message -->
    <div id="reset-status" role="alert"></div>

    <div class="field-group">
      <label class="field-label" for="reset-email">Email address<sup>*</sup></label>
      <input class="field-input" type="email" id="reset-email" placeholder="Enter your email address" autocomplete="email" required />
    </div>

    <div class="field-group">
      <label class="field-label" for="new-password">Password<sup>*</sup></label>
      <input class="field-input password-field" type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" required />
    </div>

    <div class="field-group">
      <label class="field-label" for="confirm-new-password">Confirm Password<sup>*</sup></label>
      <input class="field-input password-field" type="password" id="confirm-new-password" placeholder="••••••••" autocomplete="new-password" required />
    </div>

    <!-- Hidden token field (populated from URL) -->
    <input type="hidden" id="reset-token" />

    <button class="submit-btn" id="confirm-reset" type="button">Set New Password</button>

    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to login
    </a>
  </div>

  <script src="scripts.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Pull reset token from URL
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var tokenInput = document.getElementById('reset-token');
      if (tokenInput && token) tokenInput.value = token;

      // Pre-fill email if passed in URL
      var email = params.get('email');
      var emailInput = document.getElementById('reset-email');
      if (emailInput && email) emailInput.value = decodeURIComponent(email);
    });

    var confirmBtn = document.getElementById('confirm-reset');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', async function() {
        var email = document.getElementById('reset-email')?.value.trim();
        var password = document.getElementById('new-password')?.value.trim();
        var confirm = document.getElementById('confirm-new-password')?.value.trim();
        var token = document.getElementById('reset-token')?.value.trim();
        var statusEl = document.getElementById('reset-status');

        function showStatus(msg, isError) {
          statusEl.textContent = msg;
          statusEl.className = isError ? 'error' : 'success';
        }

        if (!email || !password) {
          return showStatus('Please fill in all required fields.', true);
        }
        if (password !== confirm) {
          return showStatus('Passwords do not match.', true);
        }
        if (password.length < 8) {
          return showStatus('Password must be at least 8 characters.', true);
        }

        try {
          if (typeof apiFetch === 'function') {
            await apiFetch('/auth/reset-password', {
              method: 'POST',
              body: JSON.stringify({ email, password, token }),
            });
            showStatus('Password updated successfully. Redirecting to login…', false);
            setTimeout(function() { window.location.href = 'index.html'; }, 2000);
          } else {
            showStatus('Reset service unavailable. Please try again.', true);
          }
        } catch (err) {
          showStatus(err.message || 'Password reset failed. Please try again.', true);
        }
      });
    }
  </script>
</body>
</html>
