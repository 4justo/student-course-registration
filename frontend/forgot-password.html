<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduRegister — Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 24px 16px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .forgot-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
      padding: 36px 36px 32px;
    }
    .card-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .card-brand-icon {
      width: 36px;
      height: 36px;
      background: #111;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .card-brand-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.01em;
    }
    .card-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.025em;
      line-height: 1.25;
      margin: 0 0 8px;
    }
    .card-subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.55;
      margin: 0 0 28px;
    }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
    }
    .field-label sup { color: #111; }
    .field-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.875rem;
      color: #111;
      background: #fff;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: unset;
    }
    .field-input::placeholder { color: #9ca3af; }
    .field-input:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
    }
    .field-group { margin-bottom: 20px; }
    .submit-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 18px;
      margin-top: 4px;
    }
    .submit-btn:hover { background: #222; }
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #374151;
      text-decoration: none;
      font-weight: 500;
    }
    .back-link:hover { color: #111; }
    .back-link svg { width: 14px; height: 14px; }
    #reset-message, #reset-error {
      font-size: 0.8rem;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }
    #reset-message { background: #f0fdf4; color: #15803d; }
    #reset-error   { background: #fef2f2; color: #b91c1c; }
  </style>
</head>
<body class="auth-page">
  <div class="forgot-card">

    <!-- Brand -->
    <div class="card-brand">
      <div class="card-brand-icon">🎓</div>
      <span class="card-brand-name">EduRegister</span>
    </div>

    <h1 class="card-title">Forgot Password?</h1>
    <p class="card-subtitle">Enter your university email and we will send you a link to reset your password.</p>

    <div id="reset-message" class="hidden"></div>
    <div id="reset-error"   class="hidden"></div>

    <div class="field-group">
      <label class="field-label" for="reset-email">Email address<sup>*</sup></label>
      <input class="field-input" type="email" id="reset-email" placeholder="Enter your email address" autocomplete="email" required />
    </div>

    <button class="submit-btn" id="send-reset" type="button">Send Reset Link</button>

    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to login
    </a>
  </div>

  <!-- Hidden inputs scripts.js may reference -->
  <div style="display:none">
    <input id="supabase-url-input" />
    <input id="supabase-key-input" />
    <div id="supabase-save-feedback"></div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
