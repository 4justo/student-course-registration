<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduRegister — Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header landing-header">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <span class="brand-name">EduRegister</span>
    </div>
  </header>

  <main class="page">
    <section class="auth-container">
      <div class="auth-wrapper stacked-card auth-card rounded-[32px] bg-white/95 shadow-[0_32px_80px_rgba(15,40,32,0.14)] border border-slate-200 overflow-hidden">
        <div class="auth-top flex flex-col gap-8 p-8 sm:px-12 sm:py-10">
          <div class="brand flex items-center gap-4">
            <div class="brand-icon">🎓</div>
            <span class="brand-name">EduRegister</span>
          </div>
          <h2 class="text-4xl font-semibold tracking-tight text-slate-900">Forgot your password?</h2>
          <p class="subtitle max-w-xl">Enter your email and we will send you instructions to reset it.</p>
        </div>

        <div class="auth-body grid gap-6 p-8 sm:p-10">
          <label class="block text-sm font-semibold text-slate-800">University Email
            <input type="email" id="reset-email" placeholder="you@university.edu" class="mt-3 w-full rounded-[28px] border border-slate-200 bg-slate-50 px-5 py-4 text-slate-900 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200" />
          </label>
          <label class="block text-sm font-semibold text-slate-800">Supabase URL
            <input type="text" id="supabase-url-input" placeholder="https://your-project.supabase.co" class="mt-3 w-full rounded-[28px] border border-slate-200 bg-slate-50 px-5 py-4 text-slate-900 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200" />
          </label>
          <label class="block text-sm font-semibold text-slate-800">Supabase anon key
            <input type="password" id="supabase-key-input" placeholder="Paste your anon key" class="mt-3 w-full rounded-[28px] border border-slate-200 bg-slate-50 px-5 py-4 text-slate-900 outline-none transition focus:border-emerald-400 focus:ring-2 focus:ring-emerald-200" />
          </label>
          <button class="secondary-button full rounded-[28px]" id="save-supabase-settings">Save Supabase credentials</button>
          <button class="primary-button full rounded-[28px] bg-gradient-to-r from-emerald-700 to-blue-600 text-white shadow-lg shadow-emerald-200/40" id="send-reset">Send reset link</button>
          <p class="small-text center mt-3">Remembered your password? <a href="index.html" class="font-semibold text-emerald-700">Sign in</a></p>
          <div id="supabase-save-feedback" class="text-sm text-center text-emerald-700 hidden"></div>
          <div id="reset-message" class="text-sm text-center text-emerald-700 hidden"></div>
          <div id="reset-error" class="text-sm text-center text-red-600 hidden"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
