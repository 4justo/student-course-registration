<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduRegister — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Page shell ── */
    body.auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 24px 16px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── Card ── */
    .login-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
      padding: 36px 36px 32px;
    }

    /* ── Brand row ── */
    .card-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .card-brand-icon {
      width: 36px;
      height: 36px;
      background: #111;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .card-brand-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.01em;
    }

    /* ── Headings ── */
    .card-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.025em;
      line-height: 1.25;
      margin: 0 0 6px;
    }
    .card-subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin: 0 0 28px;
    }

    /* ── Fields ── */
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
    }
    .field-label sup { color: #111; }
    .field-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.875rem;
      color: #111;
      background: #fff;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: unset;
    }
    .field-input::placeholder { color: #9ca3af; }
    .field-input:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
    }
    .field-group {
      margin-bottom: 16px;
    }

    /* Password row */
    .password-wrapper {
      position: relative;
    }
    .password-wrapper .field-input {
      padding-right: 44px;
      letter-spacing: 0.15em;
    }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }

    /* ── Remember + Forgot row ── */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 0.8rem;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #374151;
      cursor: pointer;
    }
    .remember-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      min-height: unset;
      accent-color: #111;
      cursor: pointer;
    }
    .forgot-link {
      color: #374151;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* ── Primary button ── */
    .signin-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 18px;
    }
    .signin-btn:hover { background: #222; }
    .signin-btn:active { background: #000; }

    /* ── Create account link ── */
    .create-link {
      text-align: center;
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 18px;
    }
    .create-link a {
      color: #111;
      font-weight: 600;
      text-decoration: none;
    }
    .create-link a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 0.78rem;
      color: #9ca3af;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* ── Google sign-in ── */
    .google-btn {
      width: 100%;
      background: none;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .google-btn:hover { color: #111; }
    .google-icon {
      width: 18px;
      height: 18px;
    }

    /* ── Error / success messages ── */
    #login-message {
      font-size: 0.8rem;
      margin-bottom: 12px;
      border-radius: 6px;
      padding: 8px 12px;
      display: none;
    }
    #login-message:not(:empty) { display: block; }
    #login-message.error   { background: #fef2f2; color: #b91c1c; }
    #login-message.success { background: #f0fdf4; color: #15803d; }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "EduRegister Sign In",
    "url": "https://example.com/index.html",
    "description": "Sign in to EduRegister, the university course registration system."
  }
  </script>
</head>
<body class="auth-page">

  <!-- Hidden elements kept for scripts.js compatibility -->
  <div class="visually-hidden">
    <label class="role-label">Role
      <select id="role-select" aria-label="Select role">
        <option>Student</option>
        <option>Admin</option>
      </select>
    </label>
    <button id="admin-dashboard" type="button">Admin Dashboard</button>
    <div class="pill" data-tab="login"></div>
    <div class="pill" data-tab="create"></div>
  </div>

  <main>
    <div class="login-card">

      <!-- Brand -->
      <div class="card-brand">
        <div class="card-brand-icon">🎓</div>
        <span class="card-brand-name">EduRegister</span>
      </div>

      <!-- Heading (swapped by JS on tab change) -->
      <h1 class="card-title" id="card-title">Sign in to EduRegister</h1>
      <p class="card-subtitle" id="card-subtitle">Manage your courses and registrations.</p>

      <!-- Inline message -->
      <div id="login-message" role="alert"></div>

      <!-- Login form -->
      <div class="auth-form" id="login">
        <div class="field-group">
          <label class="field-label" for="login-email">Email address<sup>*</sup></label>
          <input
            class="field-input"
            type="email"
            id="login-email"
            placeholder="Enter your university email"
            autocomplete="email"
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="login-password">Password<sup>*</sup></label>
          <div class="password-wrapper">
            <input
              class="field-input"
              type="password"
              id="login-password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button class="eye-btn eye-toggle" type="button" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="remember-me" />
            Remember Me
          </label>
          <a class="forgot-link" href="forgot-password.html">Forgot Password?</a>
        </div>

        <button class="signin-btn" id="sign-in" type="button">
          Sign in to EduRegister
        </button>

        <p class="create-link">
          New on our platform? <a href="#" class="switch-tab" data-tab="create" id="go-create">Create an account</a>
        </p>

        <div class="or-divider">or</div>

        <button class="google-btn" id="sign-in-google" type="button">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
      </div>

      <!-- Create account form (hidden by default) -->
      <div class="auth-form hidden" id="create">
        <div class="field-group">
          <label class="field-label" for="create-reg-no">Registration Number<sup>*</sup></label>
          <input class="field-input" type="text" id="create-reg-no" placeholder="e.g. STU2024001" autocomplete="off" required />
        </div>
        <div class="field-group">
          <label class="field-label" for="create-email">Email address<sup>*</sup></label>
          <input class="field-input" type="email" id="create-email" placeholder="Enter your email address" autocomplete="email" required />
        </div>
        <div class="field-group">
          <label class="field-label" for="create-password">Password<sup>*</sup></label>
          <input class="field-input" style="letter-spacing:0.12em" type="password" id="create-password" placeholder="••••••••" autocomplete="new-password" required />
        </div>
        <div class="field-group">
          <label class="field-label" for="create-confirm-password">Confirm Password<sup>*</sup></label>
          <input class="field-input" style="letter-spacing:0.12em" type="password" id="create-confirm-password" placeholder="••••••••" autocomplete="new-password" required />
        </div>
        <div class="remember-row" style="margin-bottom:16px">
          <label class="remember-label">
            <input type="checkbox" id="agree-terms" />
            I agree to <a href="#" style="color:#111;font-weight:600;text-decoration:underline">privacy policy &amp; terms</a>
          </label>
        </div>
        <button class="signin-btn" id="create-account" type="button">Sign Up to EduRegister</button>
        <p class="create-link">
          Already have an account? <a href="#" class="switch-tab" data-tab="login">Sign in instead.</a>
        </p>
      </div>

    </div>
  </main>

  <script>
    var headingsByTab = {
      login:  { title: 'Sign in to EduRegister',  subtitle: 'Manage your courses and registrations.' },
      create: { title: 'Sign Up to EduRegister',  subtitle: 'Ship Faster and Focus on Growth.' }
    };

    function switchTab(target) {
      document.querySelectorAll('.auth-form').forEach(function(f) { f.classList.add('hidden'); });
      var form = document.getElementById(target);
      if (form) form.classList.remove('hidden');
      var h = headingsByTab[target];
      if (h) {
        var t = document.getElementById('card-title');
        var s = document.getElementById('card-subtitle');
        if (t) t.textContent = h.title;
        if (s) s.textContent = h.subtitle;
      }
    }

    // Tab switching (login ↔ create account)
    document.querySelectorAll('.switch-tab').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        switchTab(this.dataset.tab);
      });
    });

    // Eye toggle
    document.querySelectorAll('.eye-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var input = this.closest('.password-wrapper').querySelector('input');
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });
  </script>
  <script src="scripts.js"></script>
</body>
</html>
